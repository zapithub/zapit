  async function loadMyContentGrid() {
    var wrap = document.getElementById('libGridWrap');
    if (!wrap) return;
    try {
      var res = await apiGet('/content/library', { page: libraryState.page, limit: 24, type: libraryState.type || undefined, status: libraryState.status || undefined });
      var items = res.data || [];
      if (!items.length) {
        wrap.style.display = 'block';
        wrap.innerHTML = emptyState({ icon: '🎨', title: 'No content yet', message: 'Generate your first caption, image or video to see it here.', ctaText: 'Create Content', ctaId: 'libEmptyCreateBtn' });
        document.getElementById('libEmptyCreateBtn').addEventListener('click', function () { navigate('create-content'); });
        return;
      }
      wrap.style.display = 'grid';
      wrap.innerHTML = items.map(function (item) {
        var thumb = item.image_url || (item.images && item.images[0]) || item.thumbnail_url;
        return (
          '<div class="card card-pad-sm" data-item-id="' + item.id + '">' +
            (thumb ? '<img src="' + escapeHtml(thumb) + '" style="width:100%;height:130px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:8px;">' :
              '<div style="width:100%;height:130px;background:var(--color-bg-secondary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:8px;">' + (CONTENT_TYPE_ICON[item.type] || '📄') + '</div>') +

              '<button class="btn btn-ghost btn-sm" data-lib-publish="' + item.id + '">Publish Now</button>' +
              '<button class="btn btn-ghost btn-sm" data-lib-regen="' + item.id + '">Regenerate</button>' +

      Array.prototype.forEach.call(wrap.querySelectorAll('[data-lib-edit]'), function (b) { b.addEventListener('click', function () { openEditContentModal(items.find(function (x) { return x.id === b.dataset.libEdit; })); }); });

        });

      Array.prototype.forEach.call(wrap.querySelectorAll('[data-lib-regen]'), function (b) {

  async function saveSchedule(contentIds) {
    var btn = document.getElementById('schedSaveBtn');
    var platforms = Array.prototype.slice.call(document.querySelectorAll('.schedPlatformCb:checked')).map(function (c) { return c.value; });
    if (!platforms.length) { showToast('Select at least one platform.', 'error'); return; }
    setModalBtnLoading(btn, true);
    try {
      if (contentIds.length === 1) {
        var dt = document.getElementById('schedDateTime').value;
        if (!dt) { showToast('Pick a date and time.', 'error'); setModalBtnLoading(btn, false); return; }
        await apiPost('/content/schedule', { content_id: contentIds[0], platforms: platforms, scheduled_for: new Date(dt).toISOString(), timezone: 'Africa/Lagos' });
      } else {

  async function saveAutomation(id) {
    var btn = document.getElementById('autoSaveBtn');
    var name = document.getElementById('autoName').value.trim();
    var platforms = Array.prototype.slice.call(document.querySelectorAll('.autoPlatformCb:checked')).map(function (c) { return c.value; });
    if (!name) { showToast('Name is required.', 'error'); return; }
    if (!platforms.length) { showToast('Select at least one platform.', 'error'); return; }
    var topics = document.getElementById('autoTopics').value.split(',').map(function (t) { return t.trim(); }).filter(Boolean);
    var payload = { name: name, frequency: val('autoFrequency'), platforms: platforms, content_type: val('autoContentType'), topics: topics, tone: val('autoTone'), language: val('autoLanguage') };
    setModalBtnLoading(btn, true);
    try {
      if (id) { await apiPatch('/content/calendar/automations/' + id, payload); showToast('Updated!', 'success'); }
      else { await apiPost('/content/calendar/automation', payload); showToast('Automation created!', 'success'); }
      closeModal();
      loadAutomationsList();
    } catch (err) { setModalBtnLoading(btn, false); showToast(err.message, 'error'); }
  }

  function renderSubPlanCards(currentPlanKey) {
    var wrap = document.getElementById('subPlanCards');
    if (!wrap || !subPlansCache) return;
    var order = ['free', 'creator', 'growth', 'agency'];
    wrap.innerHTML = order.map(function (key) {
      var plan = subPlansCache.plans[key];
      var isCurrent = key === currentPlanKey;
      var price = subBillingCycle === 'annual' ? Math.round(plan.price_annual / 12) : plan.price_raw;
      return (
        '<div class="card" style="' + (isCurrent ? 'border-color:var(--color-primary);' : '') + '">' +
          '<div style="font-size:24px;">' + PLAN_ICON_MAP[key] + '</div>' +

          '<div class="tiny text-muted mb-2">' + PLAN_DESC_MAP[key] + '</div>' +
          '<div class="stat-value">' + plan.currency_symbol + price.toLocaleString() + '<span class="tiny text-muted">/mo</span></div>' +
          (isCurrent ? '<span class="badge badge-success mt-2">Current Plan</span>' : (key === 'free' ? '' : '<button class="btn btn-primary btn-sm btn-block mt-2" data-upgrade-plan="' + key + '">Upgrade</button>')) +
        '</div>'
      );
    }).join('');
    Array.prototype.forEach.call(wrap.querySelectorAll('[data-upgrade-plan]'), function (b) {
      b.addEventListener('click', async function () {
        setModalBtnLoading(b, true, 'Redirecting…');
        try {
          var res = await apiPost('/subscription/upgrade', { plan: b.dataset.upgradePlan, billing_cycle: subBillingCycle });
          window.location.href = res.data.payment_url;
        } catch (err) { setModalBtnLoading(b, false); showToast(err.message, 'error'); }
      });
    });
  }

      wrap.innerHTML = errorState(err.message, 'invRetryBtn');

        return '<tr class="clickable" data-user-id="' + u.id + '">' +
          '<td><div class="flex items-center gap-2">' + avatarCircle(u.full_name || u.username, 30) + '<span class="fw-600">' + escapeHtml(u.full_name || u.username) + '</span></div></td>' +
          '<td>' + escapeHtml(u.email) + '</td>' +
          '<td>' + escapeHtml(u.country_code || '—') + '</td>' +
          '<td>' + (u.email_verified ? badge('Verified', 'success') : badge('Unverified', 'warning')) + (u.is_suspended ? ' ' + badge('Suspended', 'error') : '') + '</td>' +
          '<td class="text-muted">' + timeAgo(u.created_at) + '</td></tr>';
      }).join('');
      wrap.innerHTML = '<div class="table-scroll"><table class="data-table"><thead><tr><th>User</th><th>Email</th><th>Country</th><th>Status</th><th>Joined</th></tr></thead><tbody>' + rows + '</tbody></table></div>' + paginationHtml(res.meta, 'adminUsers');
      Array.prototype.forEach.call(wrap.querySelectorAll('[data-user-id]'), function (tr) { tr.addEventListener('click', function () { openAdminUserModal(tr.dataset.userId); }); });
      var prev = document.getElementById('adminUsersPrevBtn'), next = document.getElementById('adminUsersNextBtn');
      if (prev) prev.addEventListener('click', function () { if (adminUsersState.page > 1) { adminUsersState.page--; loadAdminUsers(); } });
      if (next) next.addEventListener('click', function () { if (res.meta && adminUsersState.page < res.meta.pages) { adminUsersState.page++; loadAdminUsers(); } });
    } catch (err) {
      wrap.innerHTML = errorState(err.message, 'adminUsersRetryBtn');
      var r = document.getElementById('adminUsersRetryBtn'); if (r) r.addEventListener('click', loadAdminUsers);
    }
  }
  async function openAdminUserModal(userId) {
    openModal({ title: 'User Details', bodyHtml: skeletonRows(4, 2), footerButtons: [{ label: 'Close', className: 'btn-secondary', onClick: closeModal }] });
    try {
      var res = await apiGet('/admin/users/' + userId);
      var u = res.data;
      modalBody.innerHTML =
        '<div class="flex items-center gap-2 mb-3">' + avatarCircle(u.full_name || u.username, 52) + '<div><div class="h4">' + escapeHtml(u.full_name || u.username) + '</div><div class="text-muted body-sm">' + escapeHtml(u.email) + '</div></div></div>' +
        '<div class="stat-grid mb-3">' + statCard(ICONS.orders, 'Total Orders', fmtNumber(u.total_orders)) + statCard(ICONS.revenue, 'Plan', u.plan) + '</div>' +
        '<div class="form-group"><label class="form-label">Set Plan</label><div class="flex gap-2"><select class="form-select" id="adminSetPlanSelect">' + ['free','creator','growth','agency'].map(function (p) { return '<option value="' + p + '" ' + (u.plan === p ? 'selected' : '') + '>' + p + '</option>'; }).join('') + '</select><button class="btn btn-secondary" id="adminSetPlanBtn">Set</button></div></div>' +
        '<div class="flex gap-2 mt-2">' +
          '<button class="btn btn-secondary btn-sm" id="adminSuspendBtn">' + (u.is_suspended ? 'Unsuspend' : 'Suspend') + ' User</button>' +
          '<button class="btn btn-danger btn-sm" id="adminDeleteUserBtn">Deactivate User</button>' +
        '</div>';
      document.getElementById('adminSetPlanBtn').addEventListener('click', async function () {
        var btn = this; setModalBtnLoading(btn, true);
        try { var r = await apiPost('/admin/users/' + userId + '/set-plan', { plan: document.getElementById('adminSetPlanSelect').value }); showToast(r.message, 'success'); } catch (err) { showToast(err.message, 'error'); } finally { setModalBtnLoading(btn, false); }
      });
      document.getElementById('adminSuspendBtn').addEventListener('click', async function () {
        try { var r = await apiPost('/admin/users/' + userId + '/suspend', {}); showToast(r.message, 'success'); closeModal(); loadAdminUsers(); } catch (err) { showToast(err.message, 'error'); }
      });
      document.getElementById('adminDeleteUserBtn').addEventListener('click', function () {
        confirmDialog({ title: 'Deactivate this user?', message: 'Their account will be disabled.', confirmLabel: 'Deactivate', danger: true, onConfirm: async function () {
          try { var r = await apiDelete('/admin/users/' + userId); showToast(r.message, 'success'); closeModal(); loadAdminUsers(); } catch (err) { showToast(err.message, 'error'); }
        }});
      });
    } catch (err) {
      modalBody.innerHTML = errorState(err.message, 'adminUserDetailRetryBtn');
      var r = document.getElementById('adminUserDetailRetryBtn'); if (r) r.addEventListener('click', function () { openAdminUserModal(userId); });
    }
  }

  async function renderAdminModeration() {
    var el = document.getElementById('adminContent');
    el.innerHTML = skeletonRows(6, 3);
    try {
      var res = await apiGet('/admin/content-moderation');
      var items = res.data || [];
      if (!items.length) { el.innerHTML = emptyState({ icon: '🛡️', title: 'Nothing to review', message: 'Recently generated content across all users will appear here.' }); return; }
      el.innerHTML = '<div class="table-wrap">' + items.map(function (it) {
        return '<div style="padding:12px 16px;border-bottom:1px solid var(--color-border);"><div class="flex justify-between"><span class="fw-600">' + escapeHtml(it.topic || 'Untitled') + '</span>' + badge(it.type, 'neutral') + '</div><p class="body-sm text-muted truncate">' + escapeHtml(it.caption || '') + '</p><span class="tiny text-muted">' + timeAgo(it.created_at) + '</span></div>';
      }).join('') + '</div>';
    } catch (err) { el.innerHTML = errorState(err.message, 'adminModRetryBtn'); var b = document.getElementById('adminModRetryBtn'); if (b) b.addEventListener('click', renderAdminModeration); }
  }

  function renderAdminGlobalKb() {
    var el = document.getElementById('adminContent');
    el.innerHTML =
      '<div class="card mb-3"><h4 class="mb-2">Add Global Keyword</h4>' +
        '<div class="form-row-2"><div class="form-group"><label class="form-label">Trigger</label><input class="form-input" id="gkbTrigger"></div><div class="form-group"><label class="form-label">Category</label><input class="form-input" id="gkbCategory"></div></div>' +
        '<div class="form-group"><label class="form-label">Response</label><textarea class="form-textarea" id="gkbResponse"></textarea></div>' +
        '<div class="form-row-2"><div class="form-group"><label class="form-label">Industry</label><input class="form-input" id="gkbIndustry" value="all"></div><div class="form-group"><label class="form-label">Language</label><select class="form-select" id="gkbLanguage"><option value="en">English</option><option value="pidgin">Pidgin</option></select></div></div>' +
        '<button class="btn btn-primary btn-sm" id="gkbAddBtn">Add to Library</button>' +
      '</div>' +
      '<div id="gkbListWrap">' + skeletonRows(4, 2) + '</div>';
    document.getElementById('gkbAddBtn').addEventListener('click', async function () {
      var trigger = val('gkbTrigger'), response = val('gkbResponse');
      if (!trigger || !response) { showToast('Trigger and response are required.', 'error'); return; }
      var btn = this; setModalBtnLoading(btn, true);
      try {
        await apiPost('/admin/global-kb', { trigger: trigger, response: response, category: val('gkbCategory'), industry: val('gkbIndustry') || 'all', language: val('gkbLanguage') });
        showToast('Added!', 'success');
        document.getElementById('gkbTrigger').value = ''; document.getElementById('gkbResponse').value = '';
        loadAdminGlobalKbList();
      } catch (err) { showToast(err.message, 'error'); } finally { setModalBtnLoading(btn, false); }
    });
    loadAdminGlobalKbList();
  }
  async function loadAdminGlobalKbList() {
    var wrap = document.getElementById('gkbListWrap');
    try {
      var res = await apiGet('/library/global-kb', { limit: 50 });
      var entries = res.data || [];
      if (!entries.length) { wrap.innerHTML = '<p class="text-muted body-sm">No global entries yet.</p>'; return; }
      wrap.innerHTML = entries.map(function (e) {
        return '<div class="flex items-center justify-between" style="padding:10px 0;border-bottom:1px solid var(--color-border);"><div><span class="fw-600">' + escapeHtml(e.trigger) + '</span> <span class="tiny text-muted">' + escapeHtml(e.industry || 'all') + '</span></div><label class="toggle-switch"><input type="checkbox" class="gkbActiveToggle" data-gkb-id="' + e.id + '" ' + (e.is_active !== false ? 'checked' : '') + '><span class="toggle-slider"></span></label></div>';
      }).join('');
      Array.prototype.forEach.call(wrap.querySelectorAll('.gkbActiveToggle'), function (cb) {
        cb.addEventListener('change', async function () {
          try { await apiPatch('/admin/global-kb/' + cb.dataset.gkbId, { is_active: cb.checked }); showToast('Updated!', 'success'); } catch (err) { showToast(err.message, 'error'); cb.checked = !cb.checked; }
        });
      });
    } catch (err) {
      wrap.innerHTML = errorState(err.message, 'gkbRetryBtn');
      var r = document.getElementById('gkbRetryBtn'); if (r) r.addEventListener('click', loadAdminGlobalKbList);
    }
  }

  function renderAdminTools() {
    var el = document.getElementById('adminContent');
    el.innerHTML =
      '<div class="card mb-3"><h4 class="mb-2">Test WhatsApp Message</h4>' +
        '<div class="form-row-2"><div class="form-group"><label class="form-label">Phone Number</label><input class="form-input" id="testWaTo" placeholder="+234..."></div><div class="form-group"><label class="form-label">Message</label><input class="form-input" id="testWaMsg" value="Test from ZAPIT admin 🚀"></div></div>' +
        '<button class="btn btn-primary btn-sm" id="testWaBtn">Send Test Message</button>' +
      '</div>' +
      '<div class="card"><h4 class="mb-2">Test Post Publishing</h4><p class="body-sm text-muted mb-2">Verify the publish pipeline is configured correctly.</p><button class="btn btn-secondary btn-sm" id="testPostBtn">Run Test</button></div>';
    document.getElementById('testWaBtn').addEventListener('click', async function () {
      var btn = this; setModalBtnLoading(btn, true, 'Sending…');
      try { var r = await apiPost('/admin/test-whatsapp', { to: val('testWaTo'), message: val('testWaMsg') }); showToast(r.message, r.success ? 'success' : 'error'); } catch (err) { showToast(err.message, 'error'); } finally { setModalBtnLoading(btn, false); }
    });
    document.getElementById('testPostBtn').addEventListener('click', async function () {
      try { var r = await apiPost('/admin/test-post', {}); showToast(r.message, 'info'); } catch (err) { showToast(err.message, 'error'); }
    });
  }

})();
</script>
</body>
</html>
